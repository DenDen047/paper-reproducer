name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-plugin:
    name: Validate Plugin Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          required_files=(
            "paper-reproduce-skills/.claude-plugin/plugin.json"
            "paper-reproduce-skills/Dockerfile"
            "paper-reproduce-skills/templates/report.html"
            "paper-reproduce-skills/skills/reimplement/SKILL.md"
          )
          missing=0
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=1
            else
              echo "OK: $f"
            fi
          done
          if [ $missing -eq 1 ]; then
            echo "::error::Required files are missing"
            exit 1
          fi

      - name: Validate plugin.json
        run: |
          python3 -c "
          import json, sys
          with open('paper-reproduce-skills/.claude-plugin/plugin.json') as f:
              data = json.load(f)
          required = ['name', 'version', 'description', 'author', 'license']
          missing = [k for k in required if k not in data]
          if missing:
              print(f'Missing keys: {missing}', file=sys.stderr)
              sys.exit(1)
          print(f'Plugin: {data[\"name\"]} v{data[\"version\"]}')
          "

      - name: Validate SKILL.md frontmatter
        run: |
          for skill in paper-reproduce-skills/skills/*/SKILL.md; do
            echo "Checking $skill..."
            # Verify YAML frontmatter exists (starts with ---)
            head -1 "$skill" | grep -q "^---$" || {
              echo "::error::$skill missing YAML frontmatter"
              exit 1
            }
            echo "  OK"
          done

      - name: Validate schemas are valid JSON Schema
        run: |
          pipx install check-jsonschema
          check-jsonschema --check-metaschema \
            paper-reproduce-skills/schemas/analysis.schema.json \
            paper-reproduce-skills/schemas/report.schema.json

  shell-lint:
    name: Shell Lint (bootstrap.sh / entrypoint.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n + shellcheck
        run: |
          bash -n bootstrap.sh
          bash -n paper-reproduce-skills/entrypoint.sh
          sudo apt-get install -y shellcheck
          shellcheck -S warning bootstrap.sh paper-reproduce-skills/entrypoint.sh

  unit-tests:
    name: Unit Tests (scripts/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run stdlib unittest suite
        run: |
          cd paper-reproduce-skills
          python3 -m unittest discover -s tests -v

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t paper-reproduce-test paper-reproduce-skills/

      - name: Verify image contents
        run: |
          docker run --rm --entrypoint="" paper-reproduce-test \
            ls /paper-reproduce-skills/skills/reimplement/SKILL.md
          docker run --rm --entrypoint="" paper-reproduce-test \
            ls /paper-reproduce-skills/templates/report.html
          docker run --rm --entrypoint="" paper-reproduce-test \
            ls /paper-reproduce-skills/scripts/check_claims.py
          docker run --rm --entrypoint="" paper-reproduce-test \
            ls /usr/local/bin/entrypoint.sh
          docker run --rm --entrypoint="" paper-reproduce-test \
            bash -c 'test "$(stat -c %U /home/claude/.cache)" = claude'

      - name: Verify Claude Code version (>= 2.1.144, opus[1m] support)
        run: |
          ver="$(docker run --rm --entrypoint="" paper-reproduce-test claude --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)"
          echo "claude version: $ver"
          min="2.1.144"
          lowest="$(printf '%s\n%s\n' "$min" "$ver" | sort -V | head -1)"
          if [ "$lowest" != "$min" ]; then
            echo "::error::Claude Code $ver < $min (cache-bust failed?)"
            exit 1
          fi
